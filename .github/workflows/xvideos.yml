name: XVideos Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: "XVideos video URL"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt update
          sudo apt install -y yt-dlp ffmpeg

      - name: Create downloads folder
        run: mkdir -p downloads

      - name: Download video
        run: |
          yt-dlp \
            --no-playlist \
            -o "downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"

      - name: Commit and push video
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add downloads/

          git commit -m "Add downloaded video" || echo "Nothing to commit"

          git push
