name: XVideos Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: "XVideos URL"
        required: true
        type: string

      output_folder:
        description: "Folder to store downloaded files"
        required: false
        type: string
        default: "downloads"

      quality:
        description: "yt-dlp format selector"
        required: true
        type: string
        default: "best[ext=mp4]/best"

      archive_name:
        description: "Base name for split archive (before random hex)"
        required: false
        type: string
        default: "video"

permissions:
  contents: write

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rar bc ffmpeg
          pip install yt-dlp

      - name: Create folder
        run: |
          mkdir -p "${{ github.event.inputs.output_folder }}"

      - name: Download video
        id: download
        run: |
          set -x
          FOLDER="${{ github.event.inputs.output_folder }}"

          yt-dlp \
            --no-progress \
            --newline \
            --merge-output-format mp4 \
            --force-ipv4 \
            --format "${{ github.event.inputs.quality }}" \
            --output "./$FOLDER/%(title)s-%(id)s.%(ext)s" \
            "${{ github.event.inputs.url }}"

          FILE=$(find "$FOLDER" -type f -name "*.mp4" | head -n 1)
          SIZE_BYTES=$(stat -c %s "$FILE")
          FILENAME=$(basename "$FILE")

          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT

      - name: Split if needed
        run: |
          set -x
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          FILE="$FOLDER/$FILENAME"
          SIZE_BYTES="${{ steps.download.outputs.size_bytes }}"

          SIZE_MB=$(echo "$SIZE_BYTES / 1048576" | bc)
          cd "$FOLDER"

          if (( SIZE_MB > 99 )); then
            RANDOM_HEX=$(openssl rand -hex 3)
            ARCHIVE="${{ github.event.inputs.archive_name }}_${RANDOM_HEX}"

            rar a -v95m -m0 "${ARCHIVE}.rar" "$FILENAME"

            # Remove original video file (critical to avoid GH001)
            rm -f "$FILENAME"
          else
            echo "No split required"
          fi

      - name: Generate links.txt
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          rm -f "$FOLDER/links.txt"

          for f in $(ls "$FOLDER"); do
            echo "https://raw.githack.com/$REPO/$BRANCH/$FOLDER/$f" >> "$FOLDER/links.txt"
          done

      - name: Cleanup large files (final protection)
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          echo "Removing any file > 100MB to avoid GH001"
          find "$FOLDER" -type f -size +100M -exec rm -f {} \;

      - name: Reset git staging
        run: |
          git reset

      - name: Commit and push
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"

          git add "$FOLDER"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "Add XVideos download" || echo "Nothing to commit"
          git push
